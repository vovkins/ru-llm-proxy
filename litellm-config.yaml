router_settings:
  redis_url: os.environ/REDIS_URL
  routing_strategy: simple-shuffle
  optional_pre_call_checks:
    - deployment_affinity
  deployment_affinity_ttl_seconds: 86400
  num_retries: 3
  timeout: 60

guardrails:
  - guardrail_name: "ru-pii-mask-pre"
    litellm_params:
      guardrail: litellm_guardrails.pii_guardrail.RuPIIGuardrail
      mode: "pre_call"
      default_on: true
    guardrail_info:
      description: "Masks Russian PII before the provider request. Returned by GET /guardrails/list for API consumers; LiteLLM UI may show only the guardrail name."
      params:
        - name: "stage"
          type: "string"
          description: "pre_call; masks Russian PII before the provider request."
        - name: "entities"
          type: "list[string]"
          description: "PHONE_NUMBER, EMAIL_ADDRESS, RU_INN, RU_SNILS, RU_PASSPORT, CREDIT_CARD, RU_ADDRESS, PERSON, LOCATION, ORGANIZATION."
        - name: "mapping_store"
          type: "string"
          description: "Redis key pii_mapping:<request_id> with TTL from PII_MAPPING_TTL_SECONDS."
        - name: "policy_mode"
          type: "string"
          description: "PII_GUARDRAIL_MODE: mask preserves reversible masking, block rejects detected PII before provider calls."
        - name: "request_fields"
          type: "list[string]"
          description: "Masks message.content, text content blocks, tool_calls[].function.arguments, and function_call.arguments."
  - guardrail_name: "ru-pii-mask-post"
    litellm_params:
      guardrail: litellm_guardrails.pii_guardrail.RuPIIGuardrail
      mode: "post_call"
      default_on: true
    guardrail_info:
      description: "Restores request-scoped placeholders in model responses. Returned by GET /guardrails/list for API consumers; LiteLLM UI may show only the guardrail name."
      params:
        - name: "stage"
          type: "string"
          description: "post_call; restores request-scoped placeholders in model responses."
        - name: "response_fields"
          type: "list[string]"
          description: "Restores placeholders in content, reasoning_content, response content blocks, tool_calls[].function.arguments, and function_call.arguments."
        - name: "mapping_cleanup"
          type: "string"
          description: "Deletes Redis pii_mapping:<request_id> after successful post-call processing."

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  callbacks:
    - prometheus
  drop_params: true
