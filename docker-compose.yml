services:
  # === LiteLLM Proxy ===
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: ru-llm-proxy
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
      - ./litellm_guardrails:/app/litellm_guardrails:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}
      - UI_USERNAME=${UI_USERNAME}
      - UI_PASSWORD=${UI_PASSWORD}
      - DATABASE_URL=${LITELLM_DB_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ZAI_API_KEY_2=${ZAI_API_KEY_2:-}
      - JWT_PUBLIC_KEY_URL=${JWT_PUBLIC_KEY_URL:-}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-}
      - PRESIDIO_ANALYZER_URL=${PRESIDIO_ANALYZER_URL:-http://presidio-analyzer:5001}
      - PII_GUARDRAIL_MODE=${PII_GUARDRAIL_MODE:-mask}
      - PII_GUARDRAIL_FAILURE_MODE=${PII_GUARDRAIL_FAILURE_MODE:-fail_open}
      - PII_MAPPING_TTL_SECONDS=${PII_MAPPING_TTL_SECONDS:-3600}
      - PII_GUARDRAIL_REDIS_MAX_CONNECTIONS=${PII_GUARDRAIL_REDIS_MAX_CONNECTIONS:-20}
      - PII_GUARDRAIL_REDIS_SOCKET_CONNECT_TIMEOUT_SECONDS=${PII_GUARDRAIL_REDIS_SOCKET_CONNECT_TIMEOUT_SECONDS:-1.0}
      - PII_GUARDRAIL_REDIS_SOCKET_TIMEOUT_SECONDS=${PII_GUARDRAIL_REDIS_SOCKET_TIMEOUT_SECONDS:-2.0}
      - PII_GUARDRAIL_ANALYZER_TIMEOUT_SECONDS=${PII_GUARDRAIL_ANALYZER_TIMEOUT_SECONDS:-30.0}
      - PII_GUARDRAIL_ANALYZER_CONNECT_TIMEOUT_SECONDS=${PII_GUARDRAIL_ANALYZER_CONNECT_TIMEOUT_SECONDS:-5.0}
      - PII_GUARDRAIL_ANALYZER_MAX_CONNECTIONS=${PII_GUARDRAIL_ANALYZER_MAX_CONNECTIONS:-20}
      - PII_GUARDRAIL_ANALYZER_MAX_KEEPALIVE_CONNECTIONS=${PII_GUARDRAIL_ANALYZER_MAX_KEEPALIVE_CONNECTIONS:-10}
      # Tell LiteLLM to find our guardrail module
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      presidio-analyzer:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ru-llm-proxy

  # === Presidio Analyzer ===
  presidio-analyzer:
    build:
      context: ./presidio
      dockerfile: Dockerfile
      target: analyzer
      args:
        DEEPPAVLOV_NER_MODEL_URL: ${DEEPPAVLOV_NER_MODEL_URL:-http://files.deeppavlov.ai/v1/ner/ner_rus_bert_torch_new.tar.gz}
        DEEPPAVLOV_NER_MODEL_SHA256: ${DEEPPAVLOV_NER_MODEL_SHA256:-}
        DEEPPAVLOV_NER_DOWNLOAD_TIMEOUT_SECONDS: ${DEEPPAVLOV_NER_DOWNLOAD_TIMEOUT_SECONDS:-120}
    container_name: presidio-analyzer
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PRESIDIO_ANALYZER_WORKERS=${PRESIDIO_ANALYZER_WORKERS:-1}
      - PRESIDIO_ANALYZER_CONCURRENCY_LIMIT=${PRESIDIO_ANALYZER_CONCURRENCY_LIMIT:-1}
      - PRESIDIO_ANALYZER_QUEUE_LIMIT=${PRESIDIO_ANALYZER_QUEUE_LIMIT:-8}
      - PRESIDIO_ANALYZER_QUEUE_TIMEOUT_SECONDS=${PRESIDIO_ANALYZER_QUEUE_TIMEOUT_SECONDS:-0.25}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ru-llm-proxy

  # === PostgreSQL ===
  db:
    image: postgres:16-alpine
    container_name: ru-llm-proxy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ru-llm-proxy

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: ru-llm-proxy-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - ru-llm-proxy

  # === Test runner for LiteLLM guardrail unit tests ===
  guardrail-tests:
    build:
      context: .
      dockerfile: tests/Dockerfile.guardrails
    profiles:
      - test
    working_dir: /workspace
    environment:
      - PYTHONPATH=/workspace
      - PYTHONDONTWRITEBYTECODE=1
      - PRESIDIO_ANALYZER_URL=http://presidio-analyzer:5001
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/workspace:ro
    networks:
      - ru-llm-proxy

volumes:
  pgdata:

networks:
  ru-llm-proxy:
    driver: bridge
